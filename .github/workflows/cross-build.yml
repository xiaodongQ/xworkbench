name: cross-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - darwin/arm64
          - windows/amd64
    env:
      GOOS: ${{ fromJSON('["linux","darwin","windows"]')[matrix.index] }}
      GOARCH: ${{ fromJSON('["amd64","arm64","amd64"]')[matrix.index] }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: build
        run: CGO_ENABLED=0 go build ./...
      - name: vet
        run: CGO_ENABLED=0 go vet ./...
      - name: unit tests (compile only on cross)
        run: CGO_ENABLED=0 go test -count=1 -run=^$ ./...  # 只编译，不跑（Windows runner 是 linux）
