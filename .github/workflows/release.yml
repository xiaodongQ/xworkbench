name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: tar.gz
          - os: darwin
            arch: amd64
            ext: tar.gz
          - os: windows
            arch: amd64
            ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          ./scripts/make_pack.sh

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xworkbench-${{ matrix.os }}-${{ matrix.arch }}
          path: ./dist/xworkbench_*-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: xworkbench-*
          merge-multiple: true

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: ${{ github.ref }}
          draft: false
          prerelease: false
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
